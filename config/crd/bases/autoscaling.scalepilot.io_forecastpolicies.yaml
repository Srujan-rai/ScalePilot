---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: forecastpolicies.autoscaling.scalepilot.io
spec:
  group: autoscaling.scalepilot.io
  names:
    kind: ForecastPolicy
    listKind: ForecastPolicyList
    plural: forecastpolicies
    singular: forecastpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.algorithm
      name: Algorithm
      type: string
    - jsonPath: .spec.targetDeployment.name
      name: Deployment
      type: string
    - jsonPath: .status.predictedMinReplicas
      name: Predicted
      type: string
    - jsonPath: .status.activeMinReplicas
      name: Active
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ForecastPolicy attaches to a Deployment, reads Prometheus metric history,
          runs ARIMA or Holt-Winters forecast, and patches HPA minReplicas
          before predicted spikes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ForecastPolicySpec defines the desired state of ForecastPolicy.
            properties:
              algorithm:
                default: ARIMA
                description: Algorithm selects the forecasting model.
                enum:
                - ARIMA
                - HoltWinters
                type: string
              arimaParams:
                description: ARIMAParams configures the ARIMA model. Required when
                  algorithm is ARIMA.
                properties:
                  d:
                    description: D is the differencing order.
                    maximum: 3
                    minimum: 0
                    type: integer
                  p:
                    description: P is the autoregressive order.
                    maximum: 10
                    minimum: 0
                    type: integer
                  q:
                    description: Q is the moving-average order.
                    maximum: 10
                    minimum: 0
                    type: integer
                required:
                - d
                - p
                - q
                type: object
              dryRun:
                default: false
                description: |-
                  DryRun, when true, logs predicted values and intended HPA patches
                  without applying them. Useful for simulation.
                type: boolean
              holtWintersParams:
                description: HoltWintersParams configures the Holt-Winters model.
                  Required when algorithm is HoltWinters.
                properties:
                  alpha:
                    description: |-
                      Alpha is the level smoothing coefficient in range (0,1].
                      Expressed as a decimal string (e.g. "0.3").
                    pattern: ^0?\.\d+$|^1(\.0+)?$
                    type: string
                  beta:
                    description: |-
                      Beta is the trend smoothing coefficient in range (0,1].
                      Expressed as a decimal string (e.g. "0.1").
                    pattern: ^0?\.\d+$|^1(\.0+)?$
                    type: string
                  gamma:
                    description: |-
                      Gamma is the seasonal smoothing coefficient in range (0,1].
                      Expressed as a decimal string (e.g. "0.2").
                    pattern: ^0?\.\d+$|^1(\.0+)?$
                    type: string
                  seasonalPeriods:
                    description: SeasonalPeriods is the number of data points in one
                      seasonal cycle.
                    minimum: 2
                    type: integer
                required:
                - alpha
                - beta
                - gamma
                - seasonalPeriods
                type: object
              leadTimeMinutes:
                default: 5
                description: |-
                  LeadTimeMinutes is how many minutes before a predicted spike
                  the HPA minReplicas should be raised. Range: 3-10.
                maximum: 10
                minimum: 3
                type: integer
              maxReplicaCap:
                description: |-
                  MaxReplicaCap is the ceiling applied to forecast-driven minReplicas.
                  Prevents runaway scaling from model errors.
                format: int32
                minimum: 1
                type: integer
              metricSource:
                description: MetricSource configures the Prometheus metric used for
                  training.
                properties:
                  address:
                    description: Address is the Prometheus server URL (e.g. http://prometheus:9090).
                    minLength: 1
                    type: string
                  historyDuration:
                    description: HistoryDuration is how far back to fetch training
                      data (e.g. "7d", "24h").
                    pattern: ^\d+(s|m|h|d)$
                    type: string
                  query:
                    description: Query is the PromQL query that returns a scalar or
                      single-element vector.
                    minLength: 1
                    type: string
                  stepInterval:
                    description: StepInterval is the resolution step for range queries
                      (e.g. "5m").
                    pattern: ^\d+(s|m|h|d)$
                    type: string
                required:
                - address
                - historyDuration
                - query
                type: object
              retrainIntervalMinutes:
                default: 30
                description: |-
                  RetrainIntervalMinutes is how often the model is retrained
                  in a background goroutine.
                minimum: 5
                type: integer
              scaleUpGuard:
                description: ScaleUpGuard optional Prometheus gate before increasing
                  minReplicas.
                properties:
                  address:
                    description: Address defaults to spec.metricSource.address when
                      empty.
                    type: string
                  maxMetricValue:
                    description: MaxMetricValue is a decimal threshold; scale-up is
                      blocked when the instant query is strictly greater than this
                      value.
                    minLength: 1
                    type: string
                  query:
                    description: Query is PromQL executed as an instant query.
                    minLength: 1
                    type: string
                required:
                - maxMetricValue
                - query
                type: object
              targetDeployment:
                description: TargetDeployment references the Deployment to forecast
                  for.
                properties:
                  name:
                    description: Name of the Deployment.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              targetHPA:
                description: |-
                  TargetHPA references the HPA whose minReplicas will be patched
                  ahead of predicted spikes.
                properties:
                  name:
                    description: Name of the HorizontalPodAutoscaler.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              targetMetricValuePerReplica:
                description: |-
                  TargetMetricValuePerReplica is how much of the forecast metric each replica
                  is expected to handle (same units as MetricSource.Query). When set to a
                  positive decimal string, desired replicas = ceil(peakForecast / value),
                  matching HPA averageValue-style thinking. When empty, legacy behavior applies:
                  ceil(peakForecast) — only valid if the query already returns replica-equivalent units.
                type: string
              useUpperConfidenceBound:
                default: false
                description: |-
                  UseUpperConfidenceBound, when true, uses the 95% upper forecast bound instead
                  of the point forecast when taking the peak over the lead-time window (more conservative).
                type: boolean
            required:
            - algorithm
            - leadTimeMinutes
            - metricSource
            - retrainIntervalMinutes
            - targetDeployment
            - targetHPA
            type: object
          status:
            description: ForecastPolicyStatus defines the observed state of ForecastPolicy.
            properties:
              activeMinReplicas:
                description: ActiveMinReplicas is the minReplicas currently set on
                  the HPA.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentPrediction:
                description: CurrentPrediction is the latest forecasted metric value.
                type: string
              lastTrainedAt:
                description: LastTrainedAt is when the model was last retrained.
                format: date-time
                type: string
              modelConfigMap:
                description: ModelConfigMap stores the name of the ConfigMap caching
                  the trained model.
                type: string
              predictedMinReplicas:
                description: PredictedMinReplicas is the minReplicas value the forecast
                  suggests.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
