---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: clusterscaleprofiles.autoscaling.scalepilot.io
spec:
  group: autoscaling.scalepilot.io
  names:
    kind: ClusterScaleProfile
    listKind: ClusterScaleProfileList
    plural: clusterscaleprofiles
    singular: clusterscaleprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: Max surge %
      jsonPath: .spec.maxSurgePercent
      name: MaxSurge
      type: integer
    - jsonPath: .status.activeBlackout
      name: Blackout
      type: boolean
    - jsonPath: .status.teamsConfigured
      name: Teams
      type: integer
    - jsonPath: .spec.enableGlobalDryRun
      name: DryRun
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterScaleProfile provides cluster-wide defaults for scaling operations
          including maximum surge percentages, blackout windows (cron-based),
          and per-team RBAC overrides.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterScaleProfileSpec defines the desired state of ClusterScaleProfile.
            properties:
              blackoutWindows:
                description: |-
                  BlackoutWindows defines time windows during which all scaling
                  operations are suppressed (e.g. during maintenance or deploy freezes).
                items:
                  description: BlackoutWindow defines a time window during which scaling
                    is suppressed.
                  properties:
                    end:
                      description: End is a cron expression for when the blackout
                        ends.
                      minLength: 9
                      type: string
                    name:
                      description: Name is a human-readable label for this window
                        (e.g. "maintenance-friday").
                      minLength: 1
                      type: string
                    start:
                      description: |-
                        Start is a cron expression for when the blackout begins.
                        Uses standard 5-field cron syntax (minute hour day-of-month month day-of-week).
                      minLength: 9
                      type: string
                    timezone:
                      default: UTC
                      description: Timezone is the IANA timezone for the cron schedule
                        (e.g. "America/New_York").
                      type: string
                  required:
                  - end
                  - name
                  - start
                  type: object
                type: array
              defaultCooldownSeconds:
                default: 60
                description: |-
                  DefaultCooldownSeconds is the minimum seconds between consecutive
                  scale-up events, cluster-wide.
                format: int32
                minimum: 0
                type: integer
              enableGlobalDryRun:
                default: false
                description: |-
                  EnableGlobalDryRun disables all scaling operations cluster-wide
                  and logs intended actions instead.
                type: boolean
              maxSurgePercent:
                default: 25
                description: |-
                  MaxSurgePercent is the default maximum percentage increase in replicas
                  allowed in a single reconcile cycle, cluster-wide.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              teamOverrides:
                description: |-
                  TeamOverrides provides per-team RBAC-aware scaling constraints
                  that override the cluster defaults.
                items:
                  description: TeamOverride provides per-team RBAC and scaling constraints.
                  properties:
                    allowedAlgorithms:
                      description: |-
                        AllowedAlgorithms restricts which forecast algorithms this team may use.
                        Empty means all algorithms are allowed.
                      items:
                        description: ForecastAlgorithm selects the time-series forecasting
                          model.
                        enum:
                        - ARIMA
                        - HoltWinters
                        type: string
                      type: array
                    maxReplicasPerDeployment:
                      description: |-
                        MaxReplicasPerDeployment caps the total replicas any single deployment
                        owned by this team can scale to.
                      format: int32
                      minimum: 1
                      type: integer
                    maxSurgePercent:
                      description: MaxSurgePercent overrides the cluster default for
                        this team.
                      format: int32
                      maximum: 100
                      minimum: 1
                      type: integer
                    namespaces:
                      description: Namespaces restricts this team's scaling operations
                        to these namespaces.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    teamName:
                      description: TeamName identifies the team (maps to a Kubernetes
                        Group or ServiceAccount prefix).
                      minLength: 1
                      type: string
                  required:
                  - namespaces
                  - teamName
                  type: object
                type: array
            required:
            - defaultCooldownSeconds
            - maxSurgePercent
            type: object
          status:
            description: ClusterScaleProfileStatus defines the observed state of ClusterScaleProfile.
            properties:
              activeBlackout:
                description: ActiveBlackout is true when the current time falls within
                  a blackout window.
                type: boolean
              activeBlackoutName:
                description: ActiveBlackoutName is the name of the currently active
                  blackout window.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the last reconciliation.
                format: date-time
                type: string
              teamsConfigured:
                description: TeamsConfigured is the number of teams with overrides.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
