  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.primaryCluster.name
      name: Primary
      type: string
    - jsonPath: .status.primaryReplicas
      name: PrimaryReplicas
      type: integer
    - jsonPath: .status.totalReplicas
      name: TotalReplicas
      type: integer
    - jsonPath: .status.spilloverActive
      name: Spillover
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FederatedScaledObject defines a multi-cluster workload federation policy
          that monitors a queue depth metric on the primary cluster and spills
          workloads to overflow clusters when the threshold is exceeded.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FederatedScaledObjectSpec defines the desired state of FederatedScaledObject.
            properties:
              cooldownSeconds:
                default: 120
                description: |-
                  CooldownSeconds prevents thrashing by requiring this many seconds
                  between scale-down events on overflow clusters.
                format: int32
                minimum: 30
                type: integer
              maxTotalReplicas:
                description: MaxTotalReplicas caps the total replicas across all clusters.
                format: int32
                minimum: 1
                type: integer
              metric:
                description: Metric defines the signal that triggers spillover.
                properties:
                  prometheusAddress:
                    description: PrometheusAddress is the endpoint of the Prometheus
                      server.
                    minLength: 1
                    type: string
                  query:
                    description: Query is a PromQL query returning a scalar (e.g.
                      queue depth).
                    minLength: 1
                    type: string
                  thresholdValue:
                    description: ThresholdValue is the metric value above which spillover
                      activates.
                    minLength: 1
                    type: string
                required:
                - prometheusAddress
                - query
                - thresholdValue
                type: object
              overflowClusters:
                description: |-
                  OverflowClusters lists the clusters that receive spillover workloads,
                  ordered by priority (lowest priority value is used first).
                items:
                  description: ClusterRef identifies a cluster by referencing the
                    Secret that holds its kubeconfig.
                  properties:
                    maxCapacity:
                      description: MaxCapacity is the maximum replicas this overflow
                        cluster can accept.
                      format: int32
                      minimum: 1
                      type: integer
                    name:
                      description: Name is a human-readable identifier for this cluster.
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the target namespace for spilled workloads on this cluster.
                        Defaults to the same namespace as the primary workload.
                      type: string
                    priority:
                      default: 0
                      description: |-
                        Priority determines the order in which overflow clusters are used.
                        Lower values are used first.
                      format: int32
                      minimum: 0
                      type: integer
                    secretRef:
                      description: |-
                        SecretRef references a Secret containing a kubeconfig file at key "kubeconfig".
                        The Secret must be labeled scalepilot.io/cluster=true.
                      properties:
                        name:
                          description: Name of the Secret.
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace of the Secret.
                          minLength: 1
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                minItems: 1
                type: array
              primaryCluster:
                description: PrimaryCluster identifies the main cluster where the
                  workload runs.
                properties:
                  maxCapacity:
                    description: MaxCapacity is the maximum replicas this overflow
                      cluster can accept.
                    format: int32
                    minimum: 1
                    type: integer
                  name:
                    description: Name is a human-readable identifier for this cluster.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the target namespace for spilled workloads on this cluster.
                      Defaults to the same namespace as the primary workload.
                    type: string
                  priority:
                    default: 0
                    description: |-
                      Priority determines the order in which overflow clusters are used.
                      Lower values are used first.
                    format: int32
                    minimum: 0
                    type: integer
                  secretRef:
                    description: |-
                      SecretRef references a Secret containing a kubeconfig file at key "kubeconfig".
                      The Secret must be labeled scalepilot.io/cluster=true.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                required:
                - name
                - secretRef
                type: object
              workload:
                description: Workload references the Deployment to be replicated.
                properties:
                  deploymentName:
                    description: DeploymentName is the name of the Deployment on the
                      primary cluster.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Deployment on the
                      primary cluster.
                    minLength: 1
                    type: string
                required:
                - deploymentName
                - namespace
                type: object
            required:
            - cooldownSeconds
            - metric
            - overflowClusters
            - primaryCluster
            - workload
            type: object
          status:
            description: FederatedScaledObjectStatus defines the observed state of
              FederatedScaledObject.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentMetricValue:
                description: CurrentMetricValue is the latest observed metric value.
                type: string
              lastScaleTime:
                description: LastScaleTime is the timestamp of the last scaling action.
                format: date-time
                type: string
              overflowClusters:
                description: OverflowClusters reports per-cluster overflow state.
                items:
                  description: OverflowClusterStatus tracks the state of an individual
                    overflow cluster.
                  properties:
                    healthy:
                      description: Healthy indicates whether the cluster's API server
                        is reachable.
                      type: boolean
                    lastProbeTime:
                      description: LastProbeTime is the last time the cluster was
                        health-checked.
                      format: date-time
                      type: string
                    lastSpillTime:
                      description: LastSpillTime is the last time workloads were spilled
                        to this cluster.
                      format: date-time
                      type: string
                    name:
                      description: Name matches the ClusterRef name.
                      type: string
                    replicas:
                      description: Replicas is the current replica count on this cluster.
                      format: int32
                      type: integer
                  required:
                  - healthy
                  - name
                  - replicas
                  type: object
                type: array
              primaryReplicas:
                description: PrimaryReplicas is the current replica count on the primary
                  cluster.
                format: int32
                type: integer
              spilloverActive:
                description: SpilloverActive indicates whether any overflow clusters
                  have replicas.
                type: boolean
              totalReplicas:
                description: TotalReplicas is the sum across all clusters.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
