name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57.2

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate manifests
        run: make manifests generate

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build operator binary
        run: go build -o bin/manager ./cmd/operator/main.go

      - name: Build CLI binary
        run: go build -o bin/scalepilot ./cmd/scalepilot/main.go

  manifests:
    name: Verify Generated Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate manifests
        run: make manifests generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'make manifests generate' and commit."
            git diff
            exit 1
          fi

  ko-build:
    name: ko Build (dry run)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@v0.7

      - name: Build image (no push)
        run: ko build ./cmd/operator/ --local --platform=linux/amd64
        env:
          KO_DOCKER_REPO: ko.local
