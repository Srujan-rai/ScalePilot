name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate manifests
        run: make manifests generate

      - name: Run tests with race detector
        run: make test GOFLAGS="-race"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build operator binary
        run: go build -o bin/manager ./cmd/operator/main.go

      - name: Build CLI binary
        run: go build -o bin/scalepilot ./cmd/scalepilot/main.go

  manifests:
    name: Verify Generated Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate manifests
        run: make manifests generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'make manifests generate' and commit."
            git diff
            exit 1
          fi

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint charts/scalepilot

      - name: Helm template (dry-run render)
        run: helm template scalepilot charts/scalepilot --debug

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing lint
        run: ct lint --charts charts/scalepilot --validate-maintainers=false

  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: documentation

      - name: Build documentation site
        run: npm run build
        working-directory: documentation

  ko-build:
    name: ko Build (dry run)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@v0.7

      - name: Build image (no push)
        run: ko build ./cmd/operator/ --local --platform=linux/amd64
        env:
          KO_DOCKER_REPO: ko.local
