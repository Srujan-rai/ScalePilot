apiVersion: apps/v1
kind: Deployment
metadata:
  name: spike-app
  namespace: production
  labels:
    app: spike-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spike-app
  template:
    metadata:
      labels:
        app: spike-app
    spec:
      containers:
        - name: spike-app
          image: python:3.11-slim
          command:
            - python3
            - -c
            - |
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import math, os

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      # Burn CPU proportional to ?load= query param (default 5000 iterations)
                      path = self.path
                      load = 5000
                      if "load=" in path:
                          try:
                              load = int(path.split("load=")[1].split("&")[0])
                          except Exception:
                              pass
                      result = sum(math.sqrt(i) * math.log(i + 1) for i in range(1, load))
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(f"ok result={result:.2f}\n".encode())

                  def log_message(self, *args):
                      pass  # suppress access logs

              port = int(os.environ.get("PORT", "8080"))
              print(f"spike-app listening on :{port}", flush=True)
              HTTPServer(("", port), Handler).serve_forever()
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: spike-app
  namespace: production
spec:
  selector:
    app: spike-app
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spike-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spike-app
  minReplicas: 1
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
