apiVersion: autoscaling.scalepilot.io/v1alpha1
kind: FederatedScaledObject
metadata:
  name: order-processor-federation
  namespace: production
spec:
  primaryCluster:
    name: primary
    # setup.sh creates this secret from your current kubeconfig
    secretRef:
      name: cluster-primary
      namespace: scalepilot-system
  overflowClusters:
    - name: overflow
      # setup.sh creates this secret pointing at the same cluster —
      # overflow pods land in the same cluster (different namespace in prod)
      secretRef:
        name: cluster-overflow
        namespace: scalepilot-system
      maxCapacity: 5
      priority: 1
  metric:
    # In-cluster address when operator runs inside the cluster.
    # When running locally via `make run`, use kubectl port-forward and set localhost:9090.
    prometheusAddress: http://localhost:9090
    # kube_deployment_status_replicas will be > 0 immediately after the
    # test-workload.yaml Deployment is running — overflow triggers fast.
    query: 'vector(5)'
    # threshold=0 means: overflow when metric > 0.
    # vector(5) returns 5 → ceil(5) - primaryReplicas(1) = 4 overflow replicas.
    thresholdValue: "0"
  workload:
    deploymentName: order-processor
    namespace: production
  # Short cooldown so you can observe repeated reconciles without waiting
  cooldownSeconds: 30
  maxTotalReplicas: 10
