apiVersion: autoscaling.scalepilot.io/v1alpha1
kind: ForecastPolicy
metadata:
  name: web-frontend-forecast
  namespace: production
spec:
  targetDeployment:
    name: web-frontend
  targetHPA:
    name: web-frontend-hpa
  metricSource:
    # Prometheus installed by setup.sh via Helm
    # In-cluster address when operator runs inside the cluster.
    # When running locally via `make run`, use kubectl port-forward and set localhost:9090.
    address: http://localhost:9090
    # Real HTTP request rate to web-frontend — goes up with load, drops when load stops.
    # This lets ARIMA forecast scale-down as well as scale-up.
    query: 'sum(rate(container_cpu_usage_seconds_total{namespace="production",pod=~"web-frontend.*"}[2m]))'
    historyDuration: "1h"
    stepInterval: "1m"
  algorithm: ARIMA
  arimaParams:
    p: 2
    d: 1
    q: 1
  leadTimeMinutes: 5
  # Short retrain interval for fast feedback during testing
  retrainIntervalMinutes: 5
  maxReplicaCap: 10
  # Each replica can handle 0.1 CPU cores of sustained load
  targetMetricValuePerReplica: "0.1"
  # dryRun: true means forecasts are computed and logged but the HPA is
  # NOT modified. Set to false once you trust the output.
  dryRun: true
