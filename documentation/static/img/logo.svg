<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#2563EB"/>

  <!-- Scale / balance beam (horizontal bar) -->
  <rect x="10" y="22" width="28" height="3" rx="1.5" fill="white" opacity="0.95"/>

  <!-- Center pivot post -->
  <rect x="22.5" y="22" width="3" height="10" rx="1.5" fill="white" opacity="0.9"/>

  <!-- Base -->
  <rect x="17" y="31" width="14" height="2.5" rx="1.25" fill="white" opacity="0.85"/>

  <!-- Left pan (rising — predictive scaling going up) -->
  <circle cx="13" cy="17" r="4" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <line x1="13" y1="21" x2="13" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pan (slightly lower — load) -->
  <circle cx="35" cy="20" r="4" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <line x1="35" y1="24" x2="35" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Upward arrow on left pan to indicate predictive pre-scaling -->
  <path d="M13 19 L13 14 M11 16 L13 14 L15 16" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small dot indicator — "pilot" navigation -->
  <circle cx="24" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="24" cy="12" r="1" fill="#2563EB"/>
</svg>
